<script>
        // Simple search filter interaction
        document.querySelector('input[type="text"]').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.user-card');
            
            cards.forEach(card => {
                const name = card.querySelector('.font-h3').textContent.toLowerCase();
                const role = card.querySelector('.font-body-sm').textContent.toLowerCase();
                
                if (name.includes(searchTerm) || role.includes(searchTerm)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Toggle Suspend micro-interaction
        document.querySelectorAll('button').forEach(btn => {
            if (btn.textContent === 'Suspend' || btn.textContent === 'Activate') {
                btn.addEventListener('click', function() {
                    const card = this.closest('.user-card');
                    const badge = card.querySelector('span[class*="rounded-full"]');
                    const avatar = card.querySelector('img');
                    
                    if (this.textContent === 'Suspend') {
                        this.textContent = 'Activate';
                        this.className = 'px-4 py-2 bg-primary-container text-on-primary-container rounded-lg border border-primary-container font-label-md text-label-md hover:brightness-110 active:scale-95 transition-all';
                        badge.textContent = 'Suspended';
                        badge.className = 'px-2.5 py-0.5 rounded-full text-[12px] font-semibold bg-surface-container-highest text-outline';
                        card.classList.add('opacity-80');
                        avatar.classList.add('grayscale');
                    } else {
                        this.textContent = 'Suspend';
                        this.className = 'px-4 py-2 bg-surface-container-low text-on-surface rounded-lg border border-outline-variant font-label-md text-label-md hover:bg-surface-container-high active:scale-95 transition-all';
                        badge.textContent = 'Active';
                        badge.className = 'px-2.5 py-0.5 rounded-full text-[12px] font-semibold bg-emerald-100 text-emerald-700';
                        card.classList.remove('opacity-80');
                        avatar.classList.remove('grayscale');
                    }
                });
            }
        });
    </script>
